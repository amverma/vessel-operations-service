name: R1-R20 Resilience Guardrail Checker

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'k8s/**'
      - 'helm/**'
      - 'schemas/**'
      - 'infrastructure/**'
      - 'specs/**'
      - 'config/**'
      - 'application.yml'
      - 'application.yaml'
      - 'pom.xml'
      - 'build.gradle'
  workflow_dispatch:
    inputs:
      severity_threshold:
        description: 'Minimum severity to fail the check (CRITICAL, HIGH, MEDIUM, LOW)'
        required: false
        default: 'CRITICAL'
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
      target_branch:
        description: 'Target branch to compare against (optional)'
        required: false
        default: ''

env:
  CHECKER_VERSION: '1.0'
  PYTHON_VERSION: '3.11'

jobs:
  resilience-check:
    name: R1-R20 Guardrail Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Get changed files
        id: changed-files
        if: github.event_name == 'pull_request'
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(src/|k8s/|helm/|schemas/|infrastructure/|specs/|config/)' >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Count changed files
          CHANGED_COUNT=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(src/|k8s/|helm/|schemas/|infrastructure/|specs/|config/)' | wc -l)
          echo "changed_count=$CHANGED_COUNT" >> $GITHUB_OUTPUT
          echo "📝 Found $CHANGED_COUNT changed files to analyze"
      
      - name: Run R1-R20 Resilience Checker
        id: resilience-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          SEVERITY_THRESHOLD: ${{ github.event.inputs.severity_threshold || 'CRITICAL' }}
        run: |
          python .github/scripts/resilience_checker.py \
            --repo-path . \
            --output-format json \
            --output-file resilience-report.json \
            --severity-threshold $SEVERITY_THRESHOLD
      
      - name: Upload resilience report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resilience-report
          path: resilience-report.json
          retention-days: 30
      
      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('resilience-report.json', 'utf8'));
            
            // Build comment body
            let commentBody = `## 🛡️ R1-R20 Resilience Guardrail Check v${process.env.CHECKER_VERSION}\n\n`;
            commentBody += `**Status:** ${report.overall_status === 'PASS' ? '✅ PASSED' : '❌ FAILED'}\n`;
            commentBody += `**Checked:** ${report.timestamp}\n\n`;
            
            // Summary
            commentBody += `### Summary\n\n`;
            commentBody += `| Severity | Passed | Failed | Total |\n`;
            commentBody += `|----------|--------|--------|-------|\n`;
            commentBody += `| CRITICAL | ${report.summary.critical.passed} | ${report.summary.critical.failed} | ${report.summary.critical.total} |\n`;
            commentBody += `| HIGH | ${report.summary.high.passed} | ${report.summary.high.failed} | ${report.summary.high.total} |\n`;
            commentBody += `| MEDIUM | ${report.summary.medium.passed} | ${report.summary.medium.failed} | ${report.summary.medium.total} |\n`;
            commentBody += `| LOW | ${report.summary.low.passed} | ${report.summary.low.failed} | ${report.summary.low.total} |\n\n`;
            
            // Failed checks
            if (report.failed_checks.length > 0) {
              commentBody += `### ❌ Failed Checks\n\n`;
              for (const check of report.failed_checks) {
                commentBody += `#### ${check.id}: ${check.name}\n`;
                commentBody += `**Severity:** ${check.severity} | **Category:** ${check.category}\n\n`;
                commentBody += `${check.description}\n\n`;
                if (check.findings.length > 0) {
                  commentBody += `**Issues found:**\n`;
                  for (const finding of check.findings) {
                    commentBody += `- \`${finding.file}\`${finding.line ? `:${finding.line}` : ''} - ${finding.message}\n`;
                  }
                  commentBody += `\n`;
                }
                if (check.recommendation) {
                  commentBody += `**Recommendation:** ${check.recommendation}\n\n`;
                }
              }
            }
            
            // Passed checks summary
            if (report.passed_checks.length > 0) {
              commentBody += `### ✅ Passed Checks (${report.passed_checks.length})\n\n`;
              commentBody += `<details>\n<summary>Click to expand</summary>\n\n`;
              for (const check of report.passed_checks) {
                commentBody += `- ${check.id}: ${check.name}\n`;
              }
              commentBody += `\n</details>\n\n`;
            }
            
            // Footer
            commentBody += `---\n`;
            commentBody += `⚠️ **This check is mandatory and cannot be bypassed without Architecture Board approval.**\n\n`;
            commentBody += `📋 See [R1-R20 Resilience Checklist](../blob/main/docs/R1-R20-RESILIENCE-CHECKLIST.md) for details.\n`;
            commentBody += `🔗 Repository: vessel-operations-service\n`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('R1-R20 Resilience Guardrail Check')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
      
      - name: Check for critical failures
        if: always()
        run: |
          if [ -f resilience-report.json ]; then
            STATUS=$(jq -r '.overall_status' resilience-report.json)
            if [ "$STATUS" = "FAIL" ]; then
              echo "❌ R1-R20 Resilience check FAILED"
              echo "Critical resilience patterns are missing or incorrectly implemented."
              echo "This PR cannot be merged until all CRITICAL issues are resolved."
              exit 1
            else
              echo "✅ R1-R20 Resilience check PASSED"
            fi
          else
            echo "⚠️ Resilience report not found"
            exit 1
          fi
      
      - name: Generate badge
        if: always()
        run: |
          if [ -f resilience-report.json ]; then
            STATUS=$(jq -r '.overall_status' resilience-report.json)
            if [ "$STATUS" = "PASS" ]; then
              echo "![Resilience Check](https://img.shields.io/badge/R1--R20-PASS-success)" > resilience-badge.md
            else
              echo "![Resilience Check](https://img.shields.io/badge/R1--R20-FAIL-critical)" > resilience-badge.md
            fi
          fi
      
      - name: Upload badge
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resilience-badge
          path: resilience-badge.md
          retention-days: 30

  notify-architecture-board:
    name: Notify Architecture Board on Bypass Attempt
    runs-on: ubuntu-latest
    needs: resilience-check
    if: failure() && contains(github.event.pull_request.labels.*.name, 'bypass-resilience-check')
    steps:
      - name: Send notification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_body = `## ⚠️ Resilience Check Bypass Attempt
            
            A pull request has been labeled to bypass the R1-R20 Resilience Check.
            
            **Repository:** vessel-operations-service
            **PR:** #${{ github.event.pull_request.number }}
            **Title:** ${{ github.event.pull_request.title }}
            **Author:** @${{ github.event.pull_request.user.login }}
            **Branch:** ${{ github.head_ref }}
            **Base Branch:** ${{ github.base_ref }}
            
            **Action Required:**
            - Review the PR for legitimate bypass reasons
            - Create an ADR documenting the exception
            - Approve or reject the bypass request
            - Verify compliance with security and governance policies
            
            **GitHub Context:**
            - This is an automated notification
            - Bypass requests require Architecture Board approval
            - All exceptions must be documented in ADR format
            
            This notification is automated and cannot be disabled.`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Architecture Board] Resilience Check Bypass Request - PR #${{ github.event.pull_request.number }}`,
              body: issue_body,
              labels: ['architecture-board', 'resilience-bypass-request', 'governance']
            });

