name: Bob Fully Agentic Resilience Checker v3.0

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'k8s/**'
      - 'helm/**'
      - 'schemas/**'
      - 'infrastructure/**'
      - 'specs/**'
      - 'config/**'
      - 'resources/**'
      - 'application.yml'
      - 'application.yaml'
      - 'pom.xml'
      - 'build.gradle'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to compare against for manual execution'
        required: false
        default: ''

env:
  ARTIFACTS_DIR: '.github/artifacts'
  CONFIG_FILE: '.github/bob-agentic-config.yml'
  LLAMA_AGENT_BASE_URL: ${{ secrets.LLAMA_AGENT_BASE_URL }}
  LLAMA_AGENT_REVIEW_ENDPOINT: '/review'

jobs:
  bob-agentic-review:
    name: Bob Agentic Resilience Review  
    runs-on: [self-hosted, windows, llama]
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: repo

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: |
          git -C repo fetch origin ${{ github.base_ref }}

      - name: Resolve refs
        id: refs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_ref=${{ github.base_ref }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "base_ref=${{ github.event.inputs.target_branch }}" >> $GITHUB_OUTPUT
            echo "head_ref=$(git -C repo rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Collect changed files
        shell: bash
        run: |
          mkdir -p "${ARTIFACTS_DIR}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git -C repo diff --name-only "origin/${{ github.base_ref }}...HEAD" > "${ARTIFACTS_DIR}/changed-files.txt"
          else
            git -C repo diff --name-only "HEAD~1...HEAD" > "${ARTIFACTS_DIR}/changed-files.txt"
          fi

          grep -E '^(src/|k8s/|helm/|schemas/|infrastructure/|specs/|config/|resources/|application\.ya?ml|pom\.xml|build\.gradle)' "${ARTIFACTS_DIR}/changed-files.txt" > "${ARTIFACTS_DIR}/changed-files-filtered.txt" || true

      - name: Capture PR diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git -C repo diff "origin/${{ github.base_ref }}...HEAD" > "${ARTIFACTS_DIR}/pull-request.diff"
          else
            git -C repo diff "HEAD~1...HEAD" > "${ARTIFACTS_DIR}/pull-request.diff"
          fi

      - name: Package PR for Llama-backed Bob
        shell: bash
        run: |
          node repo/.github/llama-agent/package-pr-for-bob.js \
            --repo-root repo \
            --config "repo/${CONFIG_FILE}" \
            --changed-files "${ARTIFACTS_DIR}/changed-files-filtered.txt" \
            --diff-file "${ARTIFACTS_DIR}/pull-request.diff" \
            --output-dir "${ARTIFACTS_DIR}" \
            --repository "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number || '' }}" \
            --pr-title "${{ github.event.pull_request.title || github.workflow }}" \
            --pr-author "${{ github.event.pull_request.user.login || github.actor }}" \
            --base-ref "${{ steps.refs.outputs.base_ref }}" \
            --head-ref "${{ steps.refs.outputs.head_ref }}"

      - name: Call Llama agent review API
        id: llama_api
        shell: bash
        run: |
          if [ -z "${LLAMA_AGENT_BASE_URL}" ]; then
            echo "Missing required secret: LLAMA_AGENT_BASE_URL"
            exit 1
          fi

          node --input-type=module - <<'EOF'
          import fs from 'node:fs';

          const baseUrl = process.env.LLAMA_AGENT_BASE_URL;
          const endpoint = process.env.LLAMA_AGENT_REVIEW_ENDPOINT || '/review';
          const bundle = JSON.parse(fs.readFileSync('.github/artifacts/bob-pr-review-bundle.json', 'utf8'));

          const response = await fetch(`${baseUrl}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bundle })
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(`Llama agent API failed: ${response.status} ${response.statusText}\n${text}`);
          }

          const result = await response.json();

          if (!result.review_json || !result.review_markdown) {
            throw new Error('Llama agent API response is missing review_json or review_markdown');
          }

          fs.writeFileSync('.github/artifacts/bob-review.json', `${JSON.stringify(result.review_json, null, 2)}\n`, 'utf8');
          fs.writeFileSync('.github/artifacts/bob-review.md', `${result.review_markdown}\n`, 'utf8');
          EOF

          test -f "${ARTIFACTS_DIR}/bob-review.json"
          test -f "${ARTIFACTS_DIR}/bob-review.md"

      - name: Validate Bob result contract
        if: success()
        shell: bash
        run: |
          node repo/.github/llama-agent/validate-bob-review-result.js \
            --json-result "${ARTIFACTS_DIR}/bob-review.json" \
            --markdown-result "${ARTIFACTS_DIR}/bob-review.md"

      - name: Post Bob PR comment
        if: github.event_name == 'pull_request' && success() && hashFiles('.github/artifacts/bob-review.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.github/artifacts/bob-review.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Bob Resilience Guardian Analysis v3.0')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Upload Bob artifacts
        if: hashFiles('.github/artifacts/bob-pr-review-bundle.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: bob-resilience-analysis-v3
          path: |
            .github/artifacts/bob-pr-review-bundle.json
            .github/artifacts/bob-review.md
            .github/artifacts/bob-review.json
            .github/artifacts/changed-files-filtered.txt
            .github/artifacts/pull-request.diff
          retention-days: 30

# Made with Bob
