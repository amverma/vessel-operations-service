name: Bob Fully Agentic Resilience Checker v3.0

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'k8s/**'
      - 'helm/**'
      - 'schemas/**'
      - 'infrastructure/**'
      - 'specs/**'
      - 'config/**'
      - 'resources/**'
      - 'application.yml'
      - 'application.yaml'
      - 'pom.xml'
      - 'build.gradle'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to compare against for manual execution'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'
  ARTIFACTS_DIR: '.github/artifacts'
  CONFIG_FILE: '.github/bob-agentic-config.yml'

jobs:
  bob-agentic-review:
    name: Bob Agentic Resilience Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Resolve refs
        id: refs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_ref=${{ github.base_ref }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "base_ref=${{ github.event.inputs.target_branch }}" >> $GITHUB_OUTPUT
            echo "head_ref=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests jinja2 gitpython

      - name: Collect changed files
        shell: bash
        run: |
          mkdir -p "${ARTIFACTS_DIR}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > "${ARTIFACTS_DIR}/changed-files.txt"
          else
            git diff --name-only "HEAD~1...HEAD" > "${ARTIFACTS_DIR}/changed-files.txt"
          fi

          grep -E '^(src/|k8s/|helm/|schemas/|infrastructure/|specs/|config/|resources/|application\.ya?ml|pom\.xml|build\.gradle)' "${ARTIFACTS_DIR}/changed-files.txt" > "${ARTIFACTS_DIR}/changed-files-filtered.txt" || true

      - name: Capture PR diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff "origin/${{ github.base_ref }}...HEAD" > "${ARTIFACTS_DIR}/pull-request.diff"
          else
            git diff "HEAD~1...HEAD" > "${ARTIFACTS_DIR}/pull-request.diff"
          fi

      - name: Package PR for Bob
        shell: bash
        run: |
          python .github/scripts/package_pr_for_bob.py \
            --repo-root . \
            --config "${CONFIG_FILE}" \
            --changed-files "${ARTIFACTS_DIR}/changed-files-filtered.txt" \
            --diff-file "${ARTIFACTS_DIR}/pull-request.diff" \
            --output-dir "${ARTIFACTS_DIR}" \
            --repository "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number || '' }}" \
            --pr-title "${{ github.event.pull_request.title || github.workflow }}" \
            --pr-author "${{ github.event.pull_request.user.login || github.actor }}" \
            --base-ref "${{ steps.refs.outputs.base_ref }}" \
            --head-ref "${{ steps.refs.outputs.head_ref }}"

      - name: Await Bob review output
        shell: bash
        run: |
          echo "Bob review bundle prepared at ${ARTIFACTS_DIR}/bob-pr-review-bundle.json"
          echo "This workflow expects Bob to generate:"
          echo "  - ${ARTIFACTS_DIR}/bob-review.md"
          echo "  - ${ARTIFACTS_DIR}/bob-review.json"
          echo ""
          echo "Replace this step with your Bob CLI or Bob API invocation."
          echo "The merge decision is not computed locally."

      - name: Validate Bob result contract
        shell: bash
        run: |
          python .github/scripts/validate_bob_review_result.py \
            --json-result "${ARTIFACTS_DIR}/bob-review.json" \
            --markdown-result "${ARTIFACTS_DIR}/bob-review.md"

      - name: Post Bob PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.github/artifacts/bob-review.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Bob Resilience Guardian Analysis v3.0')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Upload Bob artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bob-resilience-analysis-v3
          path: |
            .github/artifacts/bob-pr-review-bundle.json
            .github/artifacts/bob-review.md
            .github/artifacts/bob-review.json
            .github/artifacts/v1-supporting-report.json
            .github/artifacts/changed-files-filtered.txt
            .github/artifacts/pull-request.diff
          retention-days: 30

# Made with Bob
