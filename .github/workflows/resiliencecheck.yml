name: Bob Fully Agentic Resilience Checker v3.0

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'k8s/**'
      - 'helm/**'
      - 'schemas/**'
      - 'infrastructure/**'
      - 'specs/**'
      - 'config/**'
      - 'resources/**'
      - 'application.yml'
      - 'application.yaml'
      - 'pom.xml'
      - 'build.gradle'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to compare against for manual execution'
        required: false
        default: ''

env:
  ARTIFACTS_DIR: '.github/artifacts'
  CONFIG_FILE: '.github/bob-agentic-config.yml'
  LLAMA_AGENT_BASE_URL: ${{ secrets.LLAMA_AGENT_BASE_URL }}
  LLAMA_AGENT_REVIEW_ENDPOINT: '/review'

jobs:
  bob-agentic-review:
    name: Bob Agentic Resilience Review
    runs-on: [self-hosted, windows, llama]
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Enable Git long paths on runner
        shell: powershell
        run: |
          git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: repo

      - name: Enter repository workspace
        shell: powershell
        run: |
          "GITHUB_WORKSPACE=$((Resolve-Path repo).Path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        shell: powershell
        run: |
          git -C repo fetch origin ${{ github.base_ref }}

      - name: Resolve refs
        id: refs
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            "base_ref=${{ github.base_ref }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "head_ref=${{ github.head_ref }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "base_ref=${{ github.event.inputs.target_branch }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $headRef = git -C repo rev-parse --abbrev-ref HEAD
            "head_ref=$headRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Verify local Node runtime
        shell: powershell
        run: |
          node --version
          npm --version

      - name: Collect changed files
        id: changed_files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path $env:ARTIFACTS_DIR | Out-Null

          if ("${{ github.event_name }}" -eq "pull_request") {
            $diffTarget = "origin/${{ github.base_ref }}...HEAD"
          } else {
            $diffTarget = "HEAD~1...HEAD"
          }

          $changedFiles = @(git -C repo diff --name-only $diffTarget)
          $changedFiles | Out-File -FilePath "$env:ARTIFACTS_DIR/changed-files.txt" -Encoding utf8

          $pattern = '^(src/|k8s/|helm/|schemas/|infrastructure/|specs/|config/|resources/|application\.ya?ml|pom\.xml|build\.gradle)'
          $filtered = @($changedFiles | Where-Object { $_ -match $pattern -and -not [string]::IsNullOrWhiteSpace($_) })

          if ($filtered.Count -gt 0) {
            $filtered | Out-File -FilePath "$env:ARTIFACTS_DIR/changed-files-filtered.txt" -Encoding utf8
            "has_relevant_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            New-Item -ItemType File -Force -Path "$env:ARTIFACTS_DIR/changed-files-filtered.txt" | Out-Null
            "has_relevant_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Capture PR diff
        if: steps.changed_files.outputs.has_relevant_changes == 'true'
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            $diffTarget = "origin/${{ github.base_ref }}...HEAD"
          } else {
            $diffTarget = "HEAD~1...HEAD"
          }

          git -C repo diff $diffTarget | Out-File -FilePath "$env:ARTIFACTS_DIR/pull-request.diff" -Encoding utf8

      - name: Package PR for Llama-backed Bob
        id: package_bundle
        if: steps.changed_files.outputs.has_relevant_changes == 'true'
        shell: powershell
        run: |
          node repo/.github/llama-agent/package-pr-for-bob.js `
            --repo-root repo `
            --config "repo/$env:CONFIG_FILE" `
            --changed-files "$env:ARTIFACTS_DIR/changed-files-filtered.txt" `
            --diff-file "$env:ARTIFACTS_DIR/pull-request.diff" `
            --output-dir "$env:ARTIFACTS_DIR" `
            --repository "${{ github.repository }}" `
            --pr-number "${{ github.event.pull_request.number || '' }}" `
            --pr-title "${{ github.event.pull_request.title || github.workflow }}" `
            --pr-author "${{ github.event.pull_request.user.login || github.actor }}" `
            --base-ref "${{ steps.refs.outputs.base_ref }}" `
            --head-ref "${{ steps.refs.outputs.head_ref }}"

      - name: Call Llama agent review API
        id: llama_api
        if: steps.changed_files.outputs.has_relevant_changes == 'true'
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LLAMA_AGENT_BASE_URL)) {
            throw "Missing required secret: LLAMA_AGENT_BASE_URL"
          }

          $script = @'
          import fs from 'node:fs';

          const baseUrl = process.env.LLAMA_AGENT_BASE_URL;
          const endpoint = process.env.LLAMA_AGENT_REVIEW_ENDPOINT || '/review';
          const bundle = JSON.parse(fs.readFileSync('.github/artifacts/bob-pr-review-bundle.json', 'utf8'));

          const submitResponse = await fetch(`${baseUrl}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bundle })
          });

          if (!submitResponse.ok) {
            const text = await submitResponse.text();
            throw new Error(`Llama agent API failed to accept review: ${submitResponse.status} ${submitResponse.statusText}\n${text}`);
          }

          const accepted = await submitResponse.json();
          if (!accepted.job_id) {
            throw new Error('Llama agent API response is missing job_id');
          }

          const pollUrl = `${baseUrl}${accepted.poll_url || `/review/${accepted.job_id}`}`;
          const deadline = Date.now() + (15 * 60 * 1000);
          let lastPayload = null;

          while (Date.now() < deadline) {
            const statusResponse = await fetch(pollUrl, {
              method: 'GET',
              headers: { 'Content-Type': 'application/json' }
            });

            if (!statusResponse.ok) {
              const text = await statusResponse.text();
              throw new Error(`Llama agent API polling failed: ${statusResponse.status} ${statusResponse.statusText}\n${text}`);
            }

            lastPayload = await statusResponse.json();

            if (lastPayload.status === 'completed') {
              if (!lastPayload.review_json || !lastPayload.review_markdown) {
                throw new Error('Completed Llama review is missing review_json or review_markdown');
              }

              fs.writeFileSync('.github/artifacts/bob-review.json', `${JSON.stringify(lastPayload.review_json, null, 2)}\n`, 'utf8');
              fs.writeFileSync('.github/artifacts/bob-review.md', `${lastPayload.review_markdown}\n`, 'utf8');
              process.exit(0);
            }

            if (lastPayload.status === 'failed') {
              throw new Error(`Llama review job failed: ${lastPayload.error || 'Unknown failure'}`);
            }

            await new Promise((resolve) => setTimeout(resolve, 5000));
          }

          throw new Error(`Timed out waiting for Llama review job completion. Last status: ${lastPayload?.status || 'unknown'}`);
          '@

          $tempScript = Join-Path $env:RUNNER_TEMP 'call-llama-review.mjs'
          $script | Out-File -FilePath $tempScript -Encoding utf8
          node $tempScript

      - name: Verify review artifacts exist
        id: review_artifacts
        if: steps.changed_files.outputs.has_relevant_changes == 'true' && steps.llama_api.outcome == 'success'
        shell: powershell
        run: |
          $jsonPath = Join-Path $env:ARTIFACTS_DIR 'bob-review.json'
          $markdownPath = Join-Path $env:ARTIFACTS_DIR 'bob-review.md'

          if (-not (Test-Path $jsonPath)) {
            throw "Missing Bob JSON result at $jsonPath"
          }

          if (-not (Test-Path $markdownPath)) {
            throw "Missing Bob Markdown review at $markdownPath"
          }

          "review_artifacts_ready=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate Bob result contract
        if: success() && steps.changed_files.outputs.has_relevant_changes == 'true' && steps.review_artifacts.outcome == 'success'
        shell: powershell
        run: |
          node repo/.github/llama-agent/validate-bob-review-result.js `
            --json-result "$env:ARTIFACTS_DIR/bob-review.json" `
            --markdown-result "$env:ARTIFACTS_DIR/bob-review.md"

      - name: Post Bob PR comment
        if: success() && github.event_name == 'pull_request' && steps.changed_files.outputs.has_relevant_changes == 'true' && steps.llama_api.outcome == 'success' && steps.review_artifacts.outputs.review_artifacts_ready == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const markdownPath = '.github/artifacts/bob-review.md';

            if (!fs.existsSync(markdownPath)) {
              core.info(`Skipping PR comment because ${markdownPath} does not exist.`);
              return;
            }

            const body = fs.readFileSync(markdownPath, 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Bob Resilience Guardian Analysis v3.0')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Upload Bob artifacts
        if: always() && steps.package_bundle.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: bob-resilience-analysis-v3
          path: |
            .github/artifacts/bob-pr-review-bundle.json
            .github/artifacts/bob-review.md
            .github/artifacts/bob-review.json
            .github/artifacts/changed-files-filtered.txt
            .github/artifacts/pull-request.diff
          retention-days: 30

# Made with Bob
