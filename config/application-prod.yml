spring:
  application:
    name: vessel-operations-service
  
  datasource:
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: vessel-operations-group
      enable-auto-commit: false
    producer:
      retries: 3
      acks: all

resilience4j:
  circuitbreaker:
    instances:
      externalService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
  
  retry:
    instances:
      externalService:
        max-attempts: 3
        wait-duration: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

