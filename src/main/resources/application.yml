spring:
  application:
    name: vessel-operations-service
  
  # Database Configuration - AWS Aurora PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vessel_operations}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.amazonaws.services.schemaregistry.serializers.GlueSchemaRegistryKafkaSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: com.amazonaws.services.schemaregistry.deserializers.GlueSchemaRegistryKafkaDeserializer
      group-id: vessel-operations-service
      auto-offset-reset: earliest
      enable-auto-commit: false

# AWS Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  glue:
    schema-registry:
      name: ${SCHEMA_REGISTRY_NAME:freight-forwarder-schema-registry}

# Kafka Topics Configuration
kafka:
  topics:
    # Consumed topics
    container-gated-in: port-operations.container-gated-in
    
    # Produced topics
    container-loaded: vessel-operations.container-loaded
    vessel-departed: vessel-operations.vessel-departed
    vessel-reconciled: vessel-operations.vessel-reconciled
    eta-updated: vessel-operations.eta-updated
    load-list-prepared: vessel-operations.load-list-prepared
    stowage-plan-completed: vessel-operations.stowage-plan-completed
  
  consumer:
    group-id: vessel-operations-service

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      vesselOperations:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      
      kafkaConsumer:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
  
  retry:
    instances:
      vesselOperations:
        maxAttempts: 2
        waitDuration: 200ms
        retryExceptions:
          - java.lang.Exception
      
      kafkaPublish:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - java.lang.Exception

# Actuator Configuration for Health Checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.freightforwarder.vesseloperations: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  
# Application Metadata
info:
  app:
    name: Vessel Operations Service
    description: Mission-critical service for vessel loading and departure operations
    version: 1.0.0
    criticality: P1
    rto: 2 minutes
    rpo: 2 minutes

